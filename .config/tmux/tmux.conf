# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set -g allow-passthrough all
set -g @plugins 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'leotomas/tmux-claude'

set -g mouse on
set -ga terminal-overrides ',*256color*:smcup@:rmcup@'

set-option -g set-clipboard on
set-option -g default-command /usr/local/bin/fish
set-option -g default-shell /usr/local/bin/fish
set-option -sa terminal-overrides ',xterm-256color:RGB'

# key bindings
# Open horizontal split with current path
bind % split-window -h -c "#{pane_current_path}"
# Open vertical split with current path
bind '"' split-window -v -c "#{pane_current_path}"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# URL Launcher
bind-key C-u run-shell -b "~/.config/tmux/scripts/url-launcher.sh"
bind-key s run-shell -b "~/.config/tmux/scripts/session-switcher.sh"
bind-key r run-shell -b "~/.config/tmux/scripts/review-opener.sh"
bind-key f display-popup -E "~/.config/tmux/scripts/tmux-sessionizer.sh"
bind-key C-g display-popup -E "~/.config/tmux/scripts/tmux-repo-cloner.sh"
bind-key C-h display-popup -E "~/.config/tmux/scripts/github-code-search.sh"
# Kill pane; if last pane in session, kill session and switch to main
bind-key x run-shell "~/.config/tmux/scripts/kill-pane-or-session.sh"
bind-key C-c display-popup -E -w 80 -h 30 "~/.cargo/bin/claude-tmux"

run ~/.tmux/plugins/tpm/tpm

